name: site_scope
description: SiteScope — Professional Sun & Wind direction tool for architects.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  sensors_plus: ^6.1.1
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1
  http: ^1.3.0
  fl_chart: ^0.70.2
  vector_math: ^2.1.4
  intl: ^0.20.2
  permission_handler: ^11.4.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F4F3EF"
  adaptive_icon_foreground: "assets/logo/logo.png"

flutter_native_splash:
  color: "#161B22"
  image: "assets/logo/logo.png"
  android: true
  ios: true
  color_dark: "#161B22"
  image_dark: "assets/logo/logo.png"

  android_12:
    color: "#161B22"
    image: "assets/logo/logo.png"
    color_dark: "#161B22"
    image_dark: "assets/logo/logo.png"